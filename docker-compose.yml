# NOTE: This file is no longer used for local development.
# PostgreSQL and Redis are now provisioned via Railway.
# See README.md → Setup for the current workflow.
# This file is kept for reference only.
version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lgf
      POSTGRES_PASSWORD: lgf
      POSTGRES_DB: livegamefeed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lgf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
